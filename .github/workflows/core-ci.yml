name: core-ci.yml
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
env:
  CMAKE_BUILD_TYPE: Release
  CMAKE_EXPORT_COMPILE_COMMANDS: true
  BUILD_DIR: build

defaults:
  run: 
    shell: bash

jobs:
  core-build:
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        target: [ubuntu, windows-d2d, windows-vulkan]
        include:
          - target: ubuntu
            os: ubuntu-latest
            cmake_preset: "ubuntu-debug"
            name: "ubuntu"
          - target: windows-d2d
            os: windows-latest
            cmake_preset: "windows-debug"
            name: "windows"
          - target: windows-vulkan
            os: windows-latest
            cmake_preset: "windows-vulkan-debug"
            name: "windows-vulkan"
            vulkan_version: "1.4.321.1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup ubuntu dependencies
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/setup-vulkan-ubuntu

      - name: Install ubuntu dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt install -y cmake g++ make libx11-dev vulkan-sdk ninja-build

      - name: Install windows dependencies
        if: matrix.os == 'windows-latest'
        run: |
          choco install ninja -y

      - name: Setup Vulkan SDK
        if: contains(matrix.name, 'vulkan') && matrix.os == 'windows-latest'
        uses: ./.github/actions/setup-vulkan-windows
        with:
          vulkan-version: ${{ matrix.vulkan_version }}

      - name: Vcpkg Cache
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ./vcpkg
            ./${{ env.BUILD_DIR }}/${{ matrix.cmake_preset }}/vcpkg_installed
          key: ${{ matrix.cmake_preset }}-vcpkg-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            ${{ matrix.cmake_preset }}-vcpkg-

      - name: Install vcpkg
        run: |
          if [ ! -d "./vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git            
          fi
          ./vcpkg/bootstrap-vcpkg.sh

      - name: set permission
        run: |
          chmod +x ./core/scripts/*.sh

      - name: Configure CMake
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          
          WORKSPACE=$(echo "${{ github.workspace }}" | sed 's/\\/\//g')
          
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCMAKE_TOOLCHAIN_FILE="${WORKSPACE}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            --preset ${{ matrix.cmake_preset }} ..

      - name: Build
        run: |
          cd ${{ env.BUILD_DIR }}
          cmake --build  ${{ matrix.cmake_preset }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: core-${{ matrix.cmake_preset }}-build
          path: ${{ env.BUILD_DIR }}
          overwrite: 'true'

  core-test:
    runs-on: ${{ matrix.os }}
    needs: [core-build]

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        target: [ubuntu, windows-d2d, windows-vulkan]
        include:
          - target: ubuntu
            os: ubuntu-latest
            cmake_preset: "ubuntu-debug"
            name: "ubuntu"
            swiftshader_build_os: "Linux"
          - target: windows-d2d
            os: windows-latest
            cmake_preset: "windows-debug"
            name: "windows"
          - target: windows-vulkan
            os: windows-latest
            cmake_preset: "windows-vulkan-debug"
            name: "window-vulkan"
            vulkan_version: "1.4.321.1"
            swiftshader_build_os: "Windows"
    
    steps:
      - name: Download workflows
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            .github

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: core-${{ matrix.cmake_preset }}-build
          path: ${{ env.BUILD_DIR }}

      - name: setup ubuntu dependencies
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/setup-vulkan-ubuntu

      - name: Install ubuntu dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt install -y cmake g++ make libx11-dev vulkan-sdk ninja-build

      - name: setup Vulkan SDK
        if: contains(matrix.name, 'vulkan') && matrix.os == 'windows-latest'
        uses: ./.github/actions/setup-vulkan-windows
        with:
          vulkan-version: ${{ matrix.vulkan_version }}

      - name: Setup SwiftShader
        if: matrix.os == 'ubuntu-latest' || contains(matrix.name, 'vulkan')
        uses: ./.github/actions/setup-swiftshader
        with:
          build-os: ${{ matrix.os }}

      - name: add permissions
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x ${{ env.BUILD_DIR }}/${{ matrix.cmake_preset }}/core/test/karin_test

      - name: Run tests
        env:
          VK_ICD_FILENAMES: ${{ github.workspace }}/swiftshader/build/${{ matrix.swiftshader_build_os }}/vk_swiftshader_icd.json
          UPDATE_TEST_IMAGES: 0
          TEST_PROFILE: ${{ matrix.name }}
        run: |
          cd ${{ env.BUILD_DIR }}/${{ matrix.cmake_preset }}/core/test
          ctest --output-on-failure

  kotlin-test:
    runs-on: ${{ matrix.os }}
    needs: [core-build]

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        target: [ubuntu, windows-d2d, windows-vulkan]
        include:
          - target: ubuntu
            os: ubuntu-latest
            cmake_preset: "ubuntu-debug"
            name: "ubuntu"
          - target: windows-d2d
            os: windows-latest
            cmake_preset: "windows-debug"
            name: "windows"
          - target: windows-vulkan
            os: windows-latest
            cmake_preset: "windows-vulkan-debug"
            name: "windows-vulkan"
            vulkan_version: "1.4.321.1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: core-${{ matrix.cmake_preset }}-build
          path: ${{ env.BUILD_DIR }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup gradlew
        run: |
          chmod +x ./languages/kotlin/gradlew
          chmod +x ./examples/kotlin/gradlew

      - name: Build Kotlin Bindings
        working-directory: ./languages/kotlin
        run: |
          ./gradlew build

      - name: Build Kotlin Examples
        working-directory: ./examples/kotlin
        run: |
          ./gradlew build

      - name: Run Kotlin Tests
        working-directory: ./languages/kotlin
        run: |
          ./gradlew test

      - name: Rate coverage
        working-directory: ./languages/kotlin
        run: |
          ./gradlew koverPrintCoverage