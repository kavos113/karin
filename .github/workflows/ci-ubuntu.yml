name: ci-ubuntu.yml
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
env:
  CMAKE_BUILD_TYPE: Release
  CMAKE_EXPORT_COMPILE_COMMANDS: true
  BUILD_DIR: build
  CMAKE_PRESET: ubuntu-debug-headless
  
jobs:
  core-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup dependencies
        uses: ./.github/actions/setup-vulkan-ubuntu

      - name: Install dependencies
        run: |
          sudo apt install -y cmake g++ make libx11-dev vulkan-sdk ninja-build

      - name: Vcpkg Cache
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ./vcpkg
            ./${{ env.BUILD_DIR }}/${{ env.CMAKE_PRESET }}/vcpkg_installed
          key: ${{ env.CMAKE_PRESET }}-vcpkg-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            ${{ env.CMAKE_PRESET }}-vcpkg-

      - name: Install vcpkg
        run: |
          if [ ! -d "./vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git            
          fi
          ./vcpkg/bootstrap-vcpkg.sh

      - name: set permission
        run: |
          chmod +x ./core/scripts/*.sh

      - name: Configure CMake
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}

          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            --preset ${{ env.CMAKE_PRESET }} ..

      - name: Build
        run: |
          cd ${{ env.BUILD_DIR }}
          cmake --build  ${{ env.CMAKE_PRESET }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: core-${{ env.CMAKE_PRESET }}-build
          path: ${{ env.BUILD_DIR }}
          overwrite: 'true'

  core-test:
    runs-on: ubuntu-latest
    needs: [ core-build ]

    permissions:
      contents: read

    steps:
      - name: Download workflows
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            .github

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: core-${{ env.CMAKE_PRESET }}-build
          path: ${{ env.BUILD_DIR }}

      - name: setup dependencies
        uses: ./.github/actions/setup-vulkan-ubuntu

      - name: Install dependencies
        run: |
          sudo apt install -y cmake g++ make libx11-dev vulkan-sdk vulkan-validationlayers vulkan-tools ninja-build

      - name: Setup SwiftShader
        uses: ./.github/actions/setup-swiftshader
        with:
          build-os: ubuntu-latest

      - name: add permissions
        run: |
          chmod +x ${{ env.BUILD_DIR }}/${{ env.CMAKE_PRESET }}/core/test/karin_test

      - name: Run tests (Ubuntu)
        env:
          VK_ICD_FILENAMES: ${{ github.workspace }}/swiftshader/build/Linux/vk_swiftshader_icd.json
          UPDATE_TEST_IMAGES: 0
          TEST_PROFILE: ubuntu
        run: |
          cd ${{ env.BUILD_DIR }}/${{ env.CMAKE_PRESET }}/core/test
          ctest --output-on-failure

  kotlin-test:
    runs-on: ubuntu-latest
    needs: [ core-build ]

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: core-${{ env.CMAKE_PRESET }}-build
          path: ${{ env.BUILD_DIR }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup gradlew
        run: |
          chmod +x ./languages/kotlin/gradlew
          chmod +x ./examples/kotlin/gradlew

      - name: Build Kotlin Bindings
        id: build-bindings
        working-directory: ./languages/kotlin
        background: true
        run: |
          ./gradlew build

      - name: Build Kotlin Examples
        working-directory: ./examples/kotlin
        background: true
        run: |
          ./gradlew build

      - name: Wait build binding
        wait: [build-bindings]

      - name: Run Kotlin Tests
        working-directory: ./languages/kotlin
        run: |
          ./gradlew test

      - name: Rate coverage
        working-directory: ./languages/kotlin
        run: |
          ./gradlew koverPrintCoverage